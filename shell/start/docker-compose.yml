services:

  mysql:
    image: mysql:8.0.36
    container_name: analyzer_coder_mysql
    hostname: analyzer-coder-mysql
    restart: unless-stopped

    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --innodb_buffer_pool_size=1G
      - --default-time-zone=+08:00

    ports:
      - "3806:3306"

    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/conf.d
      - ./backup/mysql:/backup

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 30s
      timeout: 10s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

    networks:
      - analyzer_coder_net


  qdrant:
    image: qdrant/qdrant:latest
    container_name: analyzer_coder_qdrant
    hostname: analyzer-coder-qdrant
    restart: unless-stopped

    environment:
      TZ: Asia/Shanghai
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - ./data/qdrant:/qdrant/storage

    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\napi-key: '$${QDRANT_API_KEY}'\\r\\nConnection: close\\r\\n\\r\\n\" >&3; timeout 2 cat <&3 | grep -q \"200 OK\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

    networks:
      - analyzer_coder_net


  neo4j:
    image: neo4j:latest
    container_name: analyzer_coder_neo4j
    hostname: analyzer-coder-neo4j
    restart: unless-stopped

    environment:
      TZ: Asia/Shanghai
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G

    ports:
      - "7474:7474"
      - "7687:7687"

    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import
      - ./data/neo4j/plugins:/plugins

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

    networks:
      - analyzer_coder_net


networks:
  analyzer_coder_net:
    driver: bridge
